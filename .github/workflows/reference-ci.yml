name: Reference reuse CI

on:
  push:
    branches: [dev, agent/reusable-image-references]
  pull_request:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: reference-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  reference-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      APP_ENV: ci
      DATABASE_URL: sqlite+aiosqlite:///./stupidbot_ci.sqlite3
      AUTO_CREATE_DB: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: |
          python -m pip install -U pip setuptools wheel
          python -m pip install -e ".[dev]"

      - name: Run project checks
        run: bash scripts/ci.sh
