name: Reference reuse CI

on:
  push:
    branches: [dev, agent/reusable-image-references]
  pull_request:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: reference-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  reference-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: |
          python -m pip install -U pip setuptools wheel
          python -m pip install -e ".[dev]"

      - name: Compile
        run: python -m compileall -q app scripts

      - name: Reference regression
        run: python scripts/reference_regression.py
