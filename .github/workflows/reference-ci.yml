name: Reference reuse CI

on:
  push:
    branches: [dev, agent/reusable-image-references]
  pull_request:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: reference-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  reference-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: stupidbot
          POSTGRES_PASSWORD: stupidbot
          POSTGRES_DB: stupidbot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stupidbot -d stupidbot_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      APP_ENV: ci
      DATABASE_URL: postgresql+asyncpg://stupidbot:stupidbot@127.0.0.1:5432/stupidbot_test
      AUTO_CREATE_DB: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: |
          python -m pip install -U pip setuptools wheel
          python -m pip install -e ".[dev]"

      - name: Compile
        run: python -m compileall -q app scripts

      - name: Reference regression
        run: python scripts/reference_regression.py

      - name: Admin smoke
        id: admin_smoke
        continue-on-error: true
        run: python scripts/admin_smoke.py > admin-smoke.log 2>&1

      - name: Upload admin smoke log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: admin-smoke-log
          path: admin-smoke.log
          if-no-files-found: error
          retention-days: 3

      - name: Main regression
        if: steps.admin_smoke.outcome == 'success'
        run: python scripts/regression_500.py

      - name: Report admin smoke failure
        if: steps.admin_smoke.outcome == 'failure'
        run: |
          tail -n 80 admin-smoke.log
          exit 1
