name: Release contracts

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: release-contracts-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      APP_ENV: ci
      DATABASE_URL: sqlite+aiosqlite:///./stupidbot_release_contracts.sqlite3
      AUTO_CREATE_DB: "true"
      ADMIN_IDS: "1001"
      ENABLED_PLUGINS: core,generation,gallery,feed,partners,payments,admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -q -e ".[dev]"
      - name: Compile
        run: python -m compileall -q app scripts
      - name: Deployment safety
        run: python scripts/regression_deployment_safety.py
      - name: Telegram UX
        run: python scripts/regression_bot_ux.py
      - name: Reusable references
        run: python scripts/reference_regression.py
      - name: Disabled backend contracts
        run: python scripts/regression_backend_contracts.py
      - name: Gallery compatibility
        run: python scripts/regression_gallery_compat.py

  admin-sqlite:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      APP_ENV: ci
      DATABASE_URL: sqlite+aiosqlite:///./stupidbot_admin_ci.sqlite3
      AUTO_CREATE_DB: "true"
      ADMIN_IDS: "1001"
      ENABLED_PLUGINS: core,generation,gallery,feed,partners,payments,admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -q -e ".[dev]"
      - name: Admin SQLite smoke
        run: |
          set -Eeuo pipefail
          python scripts/admin_smoke.py 2>&1 | tee admin-sqlite.log
      - name: Upload admin SQLite log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: admin-sqlite-log
          path: admin-sqlite.log
          if-no-files-found: error

  broad-sqlite:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      APP_ENV: ci
      DATABASE_URL: sqlite+aiosqlite:///./stupidbot_broad_ci.sqlite3
      AUTO_CREATE_DB: "true"
      ADMIN_IDS: "1001"
      ENABLED_PLUGINS: core,generation,gallery,feed,partners,payments,admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -q -e ".[dev]"
      - name: Broad current-policy SQLite regression
        run: |
          set -Eeuo pipefail
          python -c 'import asyncio; import scripts.sqlite_jsonb_compat; import scripts.sqlite_feed_query as feed; import scripts.regression_500_current as regression; regression.adapter.legacy.get_feed_tasks = feed.get_feed_tasks; asyncio.run(regression.amain())' 2>&1 | tee broad-sqlite.log
      - name: Upload broad SQLite log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: broad-sqlite-log
          path: broad-sqlite.log
          if-no-files-found: error
