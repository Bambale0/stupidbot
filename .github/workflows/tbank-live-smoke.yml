name: T-Bank live smoke

on:
  workflow_dispatch:
    inputs:
      action:
        description: Create payment, read status, or issue full refund
        required: true
        type: choice
        options:
          - create
          - status
          - refund
      confirmation:
        description: CREATE_TEST_PAYMENT, READ_TEST_PAYMENT, or REFUND_TEST_PAYMENT
        required: true
        type: string
      order_id:
        description: Required for status/refund; copy from create artifact
        required: false
        type: string
      amount_kopecks:
        description: Used only for create; default 1000 = 10 RUB
        required: true
        default: "1000"
        type: string
      simulate_spent:
        description: Before refund, spend the credit and commission to verify debt
        required: true
        default: true
        type: boolean
      timeout_seconds:
        description: Maximum refund state polling time
        required: true
        default: "180"
        type: string

permissions:
  contents: read
  issues: write

concurrency:
  group: stupidbot-tbank-live-smoke
  cancel-in-progress: false

jobs:
  tbank-smoke:
    name: Run explicitly approved T-Bank smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: staging
    env:
      STAGING_SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
      STAGING_SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
      STAGING_SSH_USER: ${{ secrets.STAGING_SSH_USER }}
      STAGING_SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
      STAGING_SSH_KNOWN_HOSTS: ${{ secrets.STAGING_SSH_KNOWN_HOSTS }}
      STAGING_APP_DIR: /root/stupidbot
      SMOKE_ACTION: ${{ inputs.action }}
      SMOKE_CONFIRMATION: ${{ inputs.confirmation }}
      SMOKE_ORDER_ID: ${{ inputs.order_id }}
      SMOKE_AMOUNT_KOPECKS: ${{ inputs.amount_kopecks }}
      SMOKE_SIMULATE_SPENT: ${{ inputs.simulate_spent }}
      SMOKE_TIMEOUT_SECONDS: ${{ inputs.timeout_seconds }}
    steps:
      - name: Validate explicit approval and access
        shell: bash
        run: |
          set -Eeuo pipefail
          expected=""
          case "${SMOKE_ACTION}" in
            create) expected="CREATE_TEST_PAYMENT" ;;
            status) expected="READ_TEST_PAYMENT" ;;
            refund) expected="REFUND_TEST_PAYMENT" ;;
            *) echo "Unsupported action" >&2; exit 2 ;;
          esac
          [[ "${SMOKE_CONFIRMATION}" == "${expected}" ]] || {
            echo "Action ${SMOKE_ACTION} requires confirmation ${expected}" >&2
            exit 78
          }
          if [[ "${SMOKE_ACTION}" != "create" && -z "${SMOKE_ORDER_ID}" ]]; then
            echo "order_id is required for ${SMOKE_ACTION}" >&2
            exit 2
          fi
          [[ "${SMOKE_AMOUNT_KOPECKS}" =~ ^[0-9]+$ ]] || {
            echo "amount_kopecks must be an integer" >&2
            exit 2
          }
          (( SMOKE_AMOUNT_KOPECKS >= 100 && SMOKE_AMOUNT_KOPECKS <= 100000 )) || {
            echo "amount_kopecks must be between 100 and 100000" >&2
            exit 2
          }
          [[ "${SMOKE_TIMEOUT_SECONDS}" =~ ^[0-9]+$ ]] || {
            echo "timeout_seconds must be an integer" >&2
            exit 2
          }
          (( SMOKE_TIMEOUT_SECONDS >= 30 && SMOKE_TIMEOUT_SECONDS <= 600 )) || {
            echo "timeout_seconds must be between 30 and 600" >&2
            exit 2
          }
          missing=()
          for name in \
            STAGING_SSH_HOST \
            STAGING_SSH_USER \
            STAGING_SSH_PRIVATE_KEY \
            STAGING_SSH_KNOWN_HOSTS
          do
            [[ -n "${!name:-}" ]] || missing+=("${name}")
          done
          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required staging secrets: %s\n' "${missing[*]}" >&2
            exit 78
          fi
          echo "STAGING_SSH_PORT=${STAGING_SSH_PORT:-22}" >> "${GITHUB_ENV}"

      - name: Configure SSH
        shell: bash
        run: |
          set -Eeuo pipefail
          install -d -m 700 ~/.ssh
          printf '%s\n' "${STAGING_SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${STAGING_SSH_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Run T-Bank smoke on staging
        shell: bash
        run: |
          set -Eeuo pipefail
          remote="${STAGING_SSH_USER}@${STAGING_SSH_HOST}"
          ssh -p "${STAGING_SSH_PORT}" "${remote}" bash -s -- \
            "${STAGING_APP_DIR}" \
            "${SMOKE_ACTION}" \
            "${SMOKE_CONFIRMATION}" \
            "${SMOKE_ORDER_ID}" \
            "${SMOKE_AMOUNT_KOPECKS}" \
            "${SMOKE_SIMULATE_SPENT}" \
            "${SMOKE_TIMEOUT_SECONDS}" <<'REMOTE' 2>&1 | tee tbank-live-smoke.log
          set -Eeuo pipefail
          app_dir=$1
          action=$2
          confirmation=$3
          order_id=$4
          amount_kopecks=$5
          simulate_spent=$6
          timeout_seconds=$7
          cd "${app_dir}"
          set -a
          # shellcheck disable=SC1091
          source .env
          set +a
          args=(
            --action "${action}"
            --confirm "${confirmation}"
            --amount-kopecks "${amount_kopecks}"
            --timeout-seconds "${timeout_seconds}"
          )
          if [[ -n "${order_id}" ]]; then
            args+=(--order-id "${order_id}")
          fi
          if [[ "${simulate_spent}" == "true" ]]; then
            args+=(--simulate-spent)
          fi
          python3 scripts/tbank_live_smoke.py "${args[@]}"
          REMOTE

      - name: Upload T-Bank smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tbank-live-smoke-${{ github.run_id }}
          path: tbank-live-smoke.log
          if-no-files-found: warn
          retention-days: 30

      - name: Publish issue status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -Eeuo pipefail
          result=failed
          marker="TBANK_SMOKE_${SMOKE_ACTION^^}="
          if [[ "${SMOKE_ACTION}" == "create" ]]; then
            marker="TBANK_SMOKE_CREATE="
          elif [[ "${SMOKE_ACTION}" == "status" ]]; then
            marker="TBANK_SMOKE_STATUS="
          elif [[ "${SMOKE_ACTION}" == "refund" ]]; then
            marker="TBANK_SMOKE_REFUND="
          fi
          if [[ -f tbank-live-smoke.log ]] && grep -q "${marker}" tbank-live-smoke.log; then
            result=passed
          fi
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          cat > tbank-status.md <<EOF
          ## T-Bank live smoke: ${result}

          - Action: \`${SMOKE_ACTION}\`
          - GitHub job status: \`${JOB_STATUS}\`
          - Run: ${run_url}
          - Destructive/payment action: explicitly approved by workflow input

          Payment URL, order identifiers and detailed evidence are kept in the workflow log artifact, not copied into this public issue comment. Credentials are never included.
          EOF
          gh issue comment 3 \
            --repo "${GITHUB_REPOSITORY}" \
            --body-file tbank-status.md
