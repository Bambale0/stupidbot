name: Financial integrity

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: financial-integrity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  postgres-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: stupidbot_ci
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d stupidbot_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      APP_ENV: ci
      DATABASE_URL: postgresql+asyncpg://postgres@127.0.0.1:5432/stupidbot_ci
      PHOTO_CREDIT_VALUE_KOPECKS: "3900"
      VIDEO_CREDIT_VALUE_KOPECKS: "10000"
      CUSTOM_CREDIT_SALES_ENABLED: "false"
      UNLIMITED_SALES_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install -U pip setuptools wheel
          python -m pip install -e ".[dev]"
      - name: Compile
        run: python -m compileall -q app scripts
      - name: Apply Alembic migrations
        run: python -m scripts.migrate_db
      - name: Financial regression
        run: |
          set +e
          python scripts/regression_financial.py > financial-regression.log 2>&1
          status=$?
          cat financial-regression.log
          exit $status
      - name: Upload financial regression log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: financial-regression-log
          path: financial-regression.log
          if-no-files-found: warn
